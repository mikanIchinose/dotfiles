name: verify-packages
on:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build affected packages
        run: |
          # If flake.lock changed, all packages are potentially affected (nixpkgs bump).
          # Otherwise build only packages whose files under nix/packages/** changed.
          flake_changed=$(git diff --name-only origin/main -- flake.lock)
          if [ -n "$flake_changed" ]; then
            echo "flake.lock changed; building all packages"
            packages=$(ls -1 nix/packages/ | sort -u)
          else
            packages=$(git diff --name-only origin/main -- nix/packages/ | cut -d/ -f3 | sort -u)
          fi

          if [ -z "$packages" ]; then
            echo "No package changes detected"
            exit 0
          fi

          failed=()
          for pkg in $packages; do
            echo "::group::Building $pkg"
            if ! NIXPKGS_ALLOW_UNFREE=1 nix build ".#$pkg" --no-link --impure; then
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::Build failed for: ${failed[*]}"
            exit 1
          fi
