name: update-packages
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ secrets.WORKFLOW_PAT }}
      - name: Setup nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "actions@github.com"
      - name: Update packages individually
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          for script in nix/packages/*/update.sh; do
            pkg="$(basename "$(dirname "$script")")"
            echo "::group::Processing $pkg"

            # Run update script
            bash "$script" 2>&1 || true

            # Format
            nix fmt 2>&1 || true

            # Check for changes
            if git diff --quiet; then
              echo "No changes for $pkg"
              echo "::endgroup::"
              continue
            fi

            # Get version diff
            branch="nix/update-$pkg"
            old_ver=$(sed -n 's/.*version = "\(.*\)".*/\1/p' <(git show HEAD:"nix/packages/$pkg/default.nix") 2>/dev/null | head -1)
            new_ver=$(sed -n 's/.*version = "\(.*\)".*/\1/p' "nix/packages/$pkg/default.nix" | head -1)

            # Build commit message and PR title
            if [ -n "$old_ver" ] && [ -n "$new_ver" ] && [ "$old_ver" != "$new_ver" ]; then
              commit_msg="nix: update $pkg $old_ver → $new_ver"
              pr_title="nix: update $pkg $old_ver → $new_ver"
            else
              commit_msg="nix: update $pkg"
              pr_title="nix: update $pkg"
            fi

            # Create branch, commit, and push
            git checkout -B "$branch"
            git add .
            git commit -m "$commit_msg"
            git push -f origin "$branch"

            # Create or update PR
            existing=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
            if [ -n "$existing" ]; then
              gh pr edit "$existing" --title "$pr_title"
            else
              gh pr create \
                --title "$pr_title" \
                --body "Automated package update." \
                --base main \
                --head "$branch"
              gh pr merge "$branch" --auto --merge
            fi

            # Reset to main for next package
            git checkout main
            git checkout -- .

            echo "::endgroup::"
          done
