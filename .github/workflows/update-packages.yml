name: update-packages
on:
  schedule:
    - cron: '0 1 * * *'
jobs:
  update:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.WORKFLOW_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "actions@github.com"
      - name: Update packages individually
        run: |
          # Keep the App token in a shell variable (NOT exported), so child
          # processes like update.sh do not inherit it. Only the gh commands
          # below receive it via an inline assignment.
          APP_TOKEN="${{ steps.app-token.outputs.token }}"

          for script in nix/packages/*/update.sh; do
            pkg="$(basename "$(dirname "$script")")"
            echo "::group::Processing $pkg"

            # Run update script without the App token in env
            bash "$script" 2>&1 || true

            # Format
            nix fmt 2>&1 || true

            # Check for changes
            if git diff --quiet; then
              echo "No changes for $pkg"
              echo "::endgroup::"
              continue
            fi

            # Do not publish an update PR that cannot build.
            NIXPKGS_ALLOW_UNFREE=1 nix build ".#$pkg" --no-link --impure

            # Get version diff
            branch="nix/update-$pkg"
            old_ver=$(sed -n 's/.*version = "\(.*\)".*/\1/p' <(git show HEAD:"nix/packages/$pkg/default.nix") 2>/dev/null | head -1)
            new_ver=$(sed -n 's/.*version = "\(.*\)".*/\1/p' "nix/packages/$pkg/default.nix" | head -1)

            # Build commit message and PR title
            if [ -n "$old_ver" ] && [ -n "$new_ver" ] && [ "$old_ver" != "$new_ver" ]; then
              commit_msg="nix: update $pkg $old_ver → $new_ver"
              pr_title="nix: update $pkg $old_ver → $new_ver"
            else
              commit_msg="nix: update $pkg"
              pr_title="nix: update $pkg"
            fi

            # Create branch, commit, and push
            git checkout -B "$branch"
            git add .
            git commit -m "$commit_msg"
            git push -f origin "$branch"

            # Create or update PR (GH_TOKEN scoped to each gh invocation)
            existing=$(GH_TOKEN="$APP_TOKEN" gh pr list --head "$branch" --state open --json number --jq '.[0].number')
            if [ -n "$existing" ]; then
              GH_TOKEN="$APP_TOKEN" gh pr edit "$existing" --title "$pr_title"
            else
              GH_TOKEN="$APP_TOKEN" gh pr create \
                --title "$pr_title" \
                --body "Automated package update." \
                --base main \
                --head "$branch"
              GH_TOKEN="$APP_TOKEN" gh pr merge "$branch" --auto --merge
            fi

            # Reset to main for next package
            git checkout main
            git checkout -- .

            echo "::endgroup::"
          done
