name: update-packages
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.WORKFLOW_PAT }}
      - name: Setup nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "actions@github.com"
      - name: Update packages
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          for script in nix/packages/*/update.sh; do
            pkg="$(basename "$(dirname "$script")")"
            echo "::group::Updating $pkg"
            bash "$script" || true
            echo "::endgroup::"
          done
      - name: Format
        run: nix fmt
      - name: Commit and push
        id: commit
        run: |
          branch="nix/update-packages"
          git checkout -B "$branch"
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "nix: update packages"
          git push -f origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"

  build-and-pr:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nix/update-packages
          token: ${{ secrets.WORKFLOW_PAT }}
      - name: Setup nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "actions@github.com"
      - name: Build check
        id: build-check
        run: |
          failed=()
          for dir in nix/packages/*/; do
            pkg="$(basename "$dir")"
            echo "::group::Building $pkg"
            if ! nix build ".#$pkg" --no-link; then
              echo "::warning::$pkg failed to build, reverting"
              git checkout -- "$dir"
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "reverted=${failed[*]}" >> "$GITHUB_OUTPUT"
          fi
      - name: Push reverts
        run: |
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "nix: revert failed builds"
          git push origin nix/update-packages
      - name: Generate update summary
        id: summary
        run: |
          updates=""
          for dir in nix/packages/*/; do
            pkg="$(basename "$dir")"
            if ! git diff --quiet origin/main -- "$dir"; then
              old_ver=$(git show origin/main:"${dir}default.nix" 2>/dev/null | sed -n 's/.*version = "\(.*\)".*/\1/p' | head -1)
              new_ver=$(sed -n 's/.*version = "\(.*\)".*/\1/p' "${dir}default.nix" | head -1)
              if [ -n "$old_ver" ] && [ -n "$new_ver" ] && [ "$old_ver" != "$new_ver" ]; then
                updates+="- \`$pkg\`: $old_ver → $new_ver"$'\n'
              else
                updates+="- \`$pkg\`"$'\n'
              fi
            fi
          done
          {
            echo "updates<<EOF"
            echo -n "$updates"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          branch="nix/update-packages"
          updates="${{ steps.summary.outputs.updates }}"
          body="Automated package update."
          if [ -n "$updates" ]; then
            body="Automated package update.

          ### Updated packages
          ${updates}"
          fi
          reverted="${{ steps.build-check.outputs.reverted }}"
          if [ -n "$reverted" ]; then
            body+="
          > [!WARNING]
          > Build failed and reverted: $reverted"
          fi
          existing=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --body "$body"
          else
            gh pr create \
              --title "nix: update packages" \
              --body "$body" \
              --base main \
              --head "$branch"
          fi
