name: update
on:
  schedule:
    - cron: '0 3,19 * * *'
jobs:
  nix-update:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.WORKFLOW_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup git
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "actions@github.com"
      - name: Update flake
        run: nix flake update
      - name: Format
        run: nix fmt
      - name: Create PR for lockfile update
        run: |
          APP_TOKEN="${{ steps.app-token.outputs.token }}"

          if git diff --quiet; then
            echo "No flake.lock changes"
            exit 0
          fi

          branch="nix/update-flake-lock"
          git checkout -B "$branch"
          git add .
          git commit -m "Update lockfile"
          git push -f origin "$branch"

          existing=$(GH_TOKEN="$APP_TOKEN" gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            GH_TOKEN="$APP_TOKEN" gh pr create \
              --title "Update lockfile" \
              --body "Automated flake.lock update." \
              --base main \
              --head "$branch"
            GH_TOKEN="$APP_TOKEN" gh pr merge "$branch" --auto --merge
          fi
